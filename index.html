<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advance Clock</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
    }

    #clock {
      width: 200px;
      height: 200px;
      border: 5px solid white;
      border-radius: 50%;
      position: relative;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom;
    }

    #hours { width: 4px; height: 50px; background: white; }
    #minutes { width: 3px; height: 70px; background: cyan; }
    #seconds { width: 2px; height: 90px; background: red; }
  </style>
</head>
<body>

<div id="clock">
  <div id="hours" class="hand"></div>
  <div id="minutes" class="hand"></div>
  <div id="seconds" class="hand"></div>
</div>

<script src="script.js"></script>

<script>
  clockRotation();
</script>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>

<script>
  $(document).ready(function() {
    clockRotation();
  });
</script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  

</body>
</html>
