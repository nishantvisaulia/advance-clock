<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iOS Style Ring Clock</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle, #0b0b12, #030304);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

/* CLOCK */
.clock {
  position: relative;
  width: 420px;
  height: 420px;
  perspective: 1000px;
}

/* FADE MASK (top-bottom like iOS) */
.fade {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: linear-gradient(
    to bottom,
    #030304 0%,
    transparent 30%,
    transparent 70%,
    #030304 100%
  );
}

/* INDICATOR */
.indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 260px;
  height: 2px;
  background: linear-gradient(to right, transparent, white, transparent);
  transform: translate(-50%, -50%);
}

/* RING */
.ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center;
  cursor: grab;
}

.ring span {
  position: absolute;
  left: 50%;
  transform-origin: 0 0;
  font-size: 13px;
  color: rgba(255,255,255,0.25);
  transition: all 0.25s ease;
}

/* ACTIVE FOCUS */
.active {
  color: white;
  font-size: 18px;
  font-weight: 600;
  transform: scale(1.4);
  text-shadow: 0 0 10px white;
}

/* CENTER GLASS */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 150px;
  height: 150px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow:
    0 0 40px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.08);
}

.time {
  font-size: 34px;
}

/* HOVER 3D */
.clock:hover {
  transform: rotateX(5deg) rotateY(5deg) scale(1.03);
  transition: 0.4s;
}
</style>
</head>

<body>

<div class="clock">

  <div class="fade"></div>
  <div class="indicator"></div>

  <div id="monthRing" class="ring"></div>
  <div id="dateRing" class="ring"></div>
  <div id="dayRing" class="ring"></div>

  <div class="center">
    <div id="time" class="time"></div>
  </div>

</div>

<script>
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

function createRing(id, items, radius) {
  const ring = document.getElementById(id);
  ring.innerHTML = "";

  items.forEach((item, i) => {
    const angle = (360 / items.length) * i;
    const span = document.createElement("span");

    span.innerText = item;

    span.style.transform =
      `rotate(${angle}deg) translate(${radius}px) rotate(-${angle}deg)`;

    ring.appendChild(span);
  });
}

function setActive(ring, angle, total) {
  const step = 360 / total;
  let index = Math.round((-angle) / step) % total;
  if (index < 0) index += total;

  [...ring.children].forEach(el => el.classList.remove("active"));
  ring.children[index].classList.add("active");
}

function enableDrag(ringId, totalItems) {
  const ring = document.getElementById(ringId);

  let angle = 0;
  let velocity = 0;
  let dragging = false;
  let lastX = 0;

  function update() {
    ring.style.transform =
      `translate(-50%, -50%) rotate(${angle}deg)`;
    setActive(ring, angle, totalItems);
  }

  function inertia() {
    velocity *= 0.95;
    angle += velocity;
    update();

    if (Math.abs(velocity) > 0.1) {
      requestAnimationFrame(inertia);
    } else {
      const step = 360 / totalItems;
      angle = Math.round(angle / step) * step;
      update();
    }
  }

  const start = (x) => {
    dragging = true;
    lastX = x;
  };

  const move = (x) => {
    if (!dragging) return;
    const dx = x - lastX;
    velocity = dx * 0.25;
    angle += velocity;
    lastX = x;
    update();
  };

  const end = () => {
    dragging = false;
    inertia();
  };

  // mouse
  ring.addEventListener("mousedown", e => start(e.clientX));
  window.addEventListener("mousemove", e => move(e.clientX));
  window.addEventListener("mouseup", end);

  // touch
  ring.addEventListener("touchstart", e => start(e.touches[0].clientX));
  window.addEventListener("touchmove", e => move(e.touches[0].clientX));
  window.addEventListener("touchend", end);
}

function updateClock() {
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString();
}

createRing("monthRing", months, 180);
createRing("dateRing", Array.from({length:31}, (_,i)=>i+1), 140);
createRing("dayRing", days, 100);

enableDrag("monthRing", 12);
enableDrag("dateRing", 31);
enableDrag("dayRing", 7);

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
