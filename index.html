<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Ring Clock</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0f0f14;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

.clock {
  position: relative;
  width: 420px;
  height: 420px;
}

.ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center;
}

.ring span {
  position: absolute;
  left: 50%;
  transform-origin: 0 0;
  font-size: 12px;
  color: #888;
}

.active {
  color: white;
  font-size: 14px;
  font-weight: bold;
}

.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.time {
  font-size: 32px;
}

.date {
  font-size: 14px;
  color: #aaa;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="clock">

  <div id="monthRing" class="ring"></div>
  <div id="dateRing" class="ring"></div>
  <div id="dayRing" class="ring"></div>

  <div class="center">
    <div id="time" class="time"></div>
    <div id="fullDate" class="date"></div>
  </div>

</div>

<script>
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

function createRing(containerId, items, radius) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  items.forEach((item, i) => {
    const angle = (360 / items.length) * i;
    const span = document.createElement("span");
    span.innerText = item;

    span.style.transform = `
      rotate(${angle}deg)
      translate(${radius}px)
      rotate(-${angle}deg)
    `;

    container.appendChild(span);
  });
}

function updateActive(containerId, index) {
  const spans = document.getElementById(containerId).children;

  for (let i = 0; i < spans.length; i++) {
    spans[i].classList.remove("active");
  }

  spans[index].classList.add("active");
}

function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  document.getElementById("time").innerText =
    `${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

  document.getElementById("fullDate").innerText =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

  // rotate rings
  document.getElementById("monthRing").style.transform =
    `translate(-50%, -50%) rotate(${(360/12)*now.getMonth()}deg)`;

  document.getElementById("dateRing").style.transform =
    `translate(-50%, -50%) rotate(${(360/31)*(now.getDate()-1)}deg)`;

  document.getElementById("dayRing").style.transform =
    `translate(-50%, -50%) rotate(${(360/7)*now.getDay()}deg)`;

  // highlight active
  updateActive("monthRing", now.getMonth());
  updateActive("dateRing", now.getDate()-1);
  updateActive("dayRing", now.getDay());
}

// create rings
createRing("monthRing", months, 160);
createRing("dateRing", Array.from({length:31}, (_,i)=>i+1), 120);
createRing("dayRing", days, 80);

// run
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
