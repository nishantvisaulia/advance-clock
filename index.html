<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apple Style Clock</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle, #0d0d14, #050507);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* CLOCK */
.clock {
  position: relative;
  width: 420px;
  height: 420px;
}

/* RINGS */
.ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center;
  cursor: grab;
}

.ring:active {
  cursor: grabbing;
}

.ring span {
  position: absolute;
  left: 50%;
  transform-origin: 0 0;
  font-size: 13px;
  color: rgba(255,255,255,0.3);
  transition: 0.2s;
}

/* ACTIVE */
.active {
  color: white;
  font-size: 16px;
  font-weight: 600;
  text-shadow: 0 0 12px white;
}

/* CENTER LINE */
.indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 260px;
  height: 2px;
  background: linear-gradient(to right, transparent, white, transparent);
  transform: translate(-50%, -50%);
}

/* CENTER */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 140px;
  height: 140px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  align-items: center;
}

.time {
  font-size: 30px;
}
</style>
</head>

<body>

<div class="clock">
  <div class="indicator"></div>

  <div id="monthRing" class="ring"></div>
  <div id="dateRing" class="ring"></div>
  <div id="dayRing" class="ring"></div>

  <div class="center">
    <div id="time" class="time"></div>
  </div>
</div>

<script>
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

function createRing(id, items, radius) {
  const ring = document.getElementById(id);
  ring.innerHTML = "";

  items.forEach((item, i) => {
    const angle = (360 / items.length) * i;
    const span = document.createElement("span");

    span.innerText = item;

    span.style.transform =
      `rotate(${angle}deg) translate(${radius}px) rotate(-${angle}deg)`;

    ring.appendChild(span);
  });
}

function setActive(ring, index) {
  [...ring.children].forEach(el => el.classList.remove("active"));
  ring.children[index].classList.add("active");
}

/* INTERACTION */
function enableDrag(ringId, totalItems) {
  const ring = document.getElementById(ringId);

  let angle = 0;
  let velocity = 0;
  let isDragging = false;
  let lastX = 0;

  ring.addEventListener("mousedown", e => {
    isDragging = true;
    lastX = e.clientX;
  });

  window.addEventListener("mouseup", () => {
    isDragging = false;

    // inertia
    const inertia = setInterval(() => {
      velocity *= 0.95;
      angle += velocity;

      ring.style.transform =
        `translate(-50%, -50%) rotate(${angle}deg)`;

      if (Math.abs(velocity) < 0.01) {
        clearInterval(inertia);

        // snap
        const step = 360 / totalItems;
        const snapped = Math.round(angle / step) * step;
        angle = snapped;

        ring.style.transform =
          `translate(-50%, -50%) rotate(${angle}deg)`;

        const index = ((-angle / step) % totalItems + totalItems) % totalItems;
        setActive(ring, Math.round(index));
      }
    }, 16);
  });

  window.addEventListener("mousemove", e => {
    if (!isDragging) return;

    const dx = e.clientX - lastX;
    velocity = dx * 0.2;
    angle += velocity;
    lastX = e.clientX;

    ring.style.transform =
      `translate(-50%, -50%) rotate(${angle}deg)`;
  });
}

/* CLOCK */
function updateClock() {
  const now = new Date();

  document.getElementById("time").innerText =
    now.toLocaleTimeString();
}

createRing("monthRing", months, 170);
createRing("dateRing", Array.from({length:31}, (_,i)=>i+1), 130);
createRing("dayRing", days, 90);

enableDrag("monthRing", 12);
enableDrag("dateRing", 31);
enableDrag("dayRing", 7);

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
