<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clock Test</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    #clock {
      width: 200px;
      height: 200px;
      border: 5px solid black;
      border-radius: 50%;
      position: relative;
      margin: 50px auto;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom;
      transform: rotate(0deg);
    }

    #hours { width: 4px; height: 50px; background: black; }
    #minutes { width: 3px; height: 70px; background: blue; }
    #seconds { width: 2px; height: 90px; background: red; }
  </style>
</head>
<body>

<div id="clock">
  <div id="hours" class="hand"></div>
  <div id="minutes" class="hand"></div>
  <div id="seconds" class="hand"></div>
</div>

<!-- Your JS file -->
<script src="script.js"></script>

<script>
  clockRotation(); // function call
</script>

</body>
</html>
