<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Ring Clock</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #14141c, #09090d);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.clock {
  position: relative;
  width: 420px;
  height: 420px;
}

/* Center indicator line */
.indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 240px;
  height: 2px;
  background: linear-gradient(to right, transparent, white, transparent);
  transform: translate(-50%, -50%);
  opacity: 0.6;
}

/* Rings */
.ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center;
  transition: transform 0.6s ease;
}

.ring span {
  position: absolute;
  left: 50%;
  transform-origin: 0 0;
  font-size: 13px;
  color: #666;
  transition: all 0.3s ease;
}

/* Active item */
.active {
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  text-shadow: 0 0 10px rgba(255,255,255,0.9);
}

/* Glow per ring */
#monthRing .active { color: #4da6ff; text-shadow: 0 0 12px #4da6ff; }
#dateRing .active { color: #ff4d6d; text-shadow: 0 0 12px #ff4d6d; }
#dayRing .active { color: #00ff88; text-shadow: 0 0 12px #00ff88; }

/* Center Glass */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 150px;
  height: 150px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  box-shadow:
    0 0 30px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.05);
}

.time {
  font-size: 32px;
  letter-spacing: 2px;
}

/* subtle zoom */
.clock:hover {
  transform: scale(1.04);
  transition: 0.4s;
}
</style>
</head>

<body>

<div class="clock">

  <div class="indicator"></div>

  <div id="monthRing" class="ring"></div>
  <div id="dateRing" class="ring"></div>
  <div id="dayRing" class="ring"></div>

  <div class="center">
    <div id="time" class="time"></div>
  </div>

</div>

<script>
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

function createRing(id, items, radius) {
  const ring = document.getElementById(id);
  ring.innerHTML = "";

  items.forEach((item, i) => {
    const angle = (360 / items.length) * i;
    const span = document.createElement("span");

    span.innerText = item;

    span.style.transform =
      `rotate(${angle}deg) translate(${radius}px) rotate(-${angle}deg)`;

    ring.appendChild(span);
  });
}

function rotateToCenter(id, index, total) {
  const angle = (360 / total) * index;
  document.getElementById(id).style.transform =
    `translate(-50%, -50%) rotate(${-angle}deg)`;
}

function updateActive(id, index) {
  const spans = document.getElementById(id).children;

  for (let i = 0; i < spans.length; i++) {
    spans[i].classList.remove("active");
  }

  spans[index].classList.add("active");
}

function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  document.getElementById("time").innerText =
    `${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

  const monthIndex = now.getMonth();
  const dateIndex = now.getDate() - 1;
  const dayIndex = now.getDay();

  rotateToCenter("monthRing", monthIndex, 12);
  rotateToCenter("dateRing", dateIndex, 31);
  rotateToCenter("dayRing", dayIndex, 7);

  updateActive("monthRing", monthIndex);
  updateActive("dateRing", dateIndex);
  updateActive("dayRing", dayIndex);
}

/* create rings */
createRing("monthRing", months, 160);
createRing("dateRing", Array.from({length:31}, (_,i)=>i+1), 120);
createRing("dayRing", days, 80);

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
