<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Ring Clock</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #12121a, #08080c);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.clock {
  position: relative;
  width: 420px;
  height: 420px;
}

/* REAL visible rings */
.ring-outline {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.r1 { width: 340px; height: 340px; }
.r2 { width: 260px; height: 260px; }
.r3 { width: 180px; height: 180px; }

/* indicator line */
.indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 260px;
  height: 2px;
  background: linear-gradient(to right, transparent, white, transparent);
  transform: translate(-50%, -50%);
  opacity: 0.7;
}

/* rings */
.ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: center;
  transition: transform 0.6s ease;
}

.ring span {
  position: absolute;
  left: 50%;
  transform-origin: 0 0;
  font-size: 12px;
  color: #555;
  transition: all 0.3s ease;
}

/* active highlight */
.active {
  color: white;
  font-size: 15px;
  font-weight: 600;
}

/* glow colors */
#monthRing .active { color: #4da6ff; text-shadow: 0 0 10px #4da6ff; }
#dateRing .active { color: #ff4d6d; text-shadow: 0 0 10px #ff4d6d; }
#dayRing .active { color: #00ff88; text-shadow: 0 0 10px #00ff88; }

/* center */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 140px;
  height: 140px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow:
    0 0 20px rgba(255,255,255,0.05),
    inset 0 0 15px rgba(255,255,255,0.05);
}

.time {
  font-size: 30px;
  letter-spacing: 2px;
}

/* hover */
.clock:hover {
  transform: scale(1.03);
  transition: 0.4s;
}
</style>
</head>

<body>

<div class="clock">

  <!-- REAL RINGS -->
  <div class="ring-outline r1"></div>
  <div class="ring-outline r2"></div>
  <div class="ring-outline r3"></div>

  <!-- indicator -->
  <div class="indicator"></div>

  <!-- dynamic rings -->
  <div id="monthRing" class="ring"></div>
  <div id="dateRing" class="ring"></div>
  <div id="dayRing" class="ring"></div>

  <!-- center -->
  <div class="center">
    <div id="time" class="time"></div>
  </div>

</div>

<script>
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

function createRing(id, items, radius) {
  const ring = document.getElementById(id);
  ring.innerHTML = "";

  items.forEach((item, i) => {
    const angle = (360 / items.length) * i;
    const span = document.createElement("span");

    span.innerText = item;

    span.style.transform =
      `rotate(${angle}deg) translate(${radius}px) rotate(-${angle}deg)`;

    ring.appendChild(span);
  });
}

function rotateToCenter(id, index, total) {
  const angle = (360 / total) * index;
  document.getElementById(id).style.transform =
    `translate(-50%, -50%) rotate(${-angle}deg)`;
}

function updateActive(id, index) {
  const spans = document.getElementById(id).children;

  for (let i = 0; i < spans.length; i++) {
    spans[i].classList.remove("active");
  }

  spans[index].classList.add("active");
}

function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  document.getElementById("time").innerText =
    `${String(hr).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

  const m = now.getMonth();
  const d = now.getDate() - 1;
  const day = now.getDay();

  rotateToCenter("monthRing", m, 12);
  rotateToCenter("dateRing", d, 31);
  rotateToCenter("dayRing", day, 7);

  updateActive("monthRing", m);
  updateActive("dateRing", d);
  updateActive("dayRing", day);
}

/* create rings with PERFECT spacing */
createRing("monthRing", months, 170);
createRing("dateRing", Array.from({length:31}, (_,i)=>i+1), 130);
createRing("dayRing", days, 90);

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
